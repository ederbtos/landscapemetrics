name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema (rasterio/GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libexpat1 libgomp1

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Gerar secrets.toml de teste (chaves aleatórias, nunca reais)
        run: |
          mkdir -p .streamlit
          python - <<'EOF'
          import secrets
          from cryptography.fernet import Fernet

          with open(".streamlit/secrets.toml", "w") as f:
              f.write(f'jwt_secret_key = "{secrets.token_hex(32)}"\n')
              f.write(f'app_encryption_key = "{Fernet.generate_key().decode()}"\n')
          EOF

      - name: Rodar suíte de testes (unitários + integração)
        run: pytest tests/ -v -m "not e2e"
